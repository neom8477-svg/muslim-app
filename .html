<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discipline App</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Фоновое изображение чёрной дыры/космоса на весь экран */
    body {
      margin: 0;
      padding: 16px;
      font-family: sans-serif;
      min-height: 100vh;
      background-image: url('https://images.unsplash.com/photo-1506703719100-a0f3a48c0f86?q=80&w=1000&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #fff;
    }

    /* Затемнение фона для читаемости интерфейса */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 15, 0.75);
      z-index: -1;
    }

    /* Полупрозрачный стиль для карточек, чтобы фон был виден */
    .main-card, .habit-card, .tabs-container {
      background: rgba(25, 25, 35, 0.6) !important;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff !important;
    }

    .main-card-title, .section-title, .habit-text {
      color: #fff !important;
    }

    .main-card-subtitle {
      color: #aaa !important;
    }
  </style>
</head>
<body>

  <!-- Верхние переключатели -->
  <div class="tabs-container" style="display: flex; gap: 10px; margin-bottom: 20px; padding: 10px; border-radius: 12px;">
    <button class="tab-btn active" style="flex: 1; padding: 10px; border-radius: 8px; border: none; background: #4f46e5; color: white; font-weight: bold;">Дисциплина</button>
    <button class="tab-btn" style="flex: 1; padding: 10px; border-radius: 8px; border: none; background: transparent; color: white;">Прогресс</button>
  </div>

  <!-- 1. Две основные категории -->
  <div class="main-categories" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px;">
    <div class="main-card" style="display: flex; justify-content: space-between; align-items: center; padding: 16px; border-radius: 14px;">
      <div>
        <div class="main-card-title" style="font-weight: bold; font-size: 1.1rem;">🕌 Пятикратный Намаз</div>
        <div class="main-card-subtitle" style="font-size: 0.9rem; margin-top: 4px;">5 из 5 выполнено</div>
      </div>
      <button class="btn-open" style="padding: 8px 16px; border-radius: 8px; border: none; background: #6366f1; color: white; cursor: pointer;">Открыть</button>
    </div>

    <div class="main-card" style="display: flex; justify-content: space-between; align-items: center; padding: 16px; border-radius: 14px;">
      <div>
        <div class="main-card-title" style="font-weight: bold; font-size: 1.1rem;">💪 Тренировка</div>
        <div class="main-card-subtitle" style="font-size: 0.9rem; margin-top: 4px;">4 из 4 выполнено</div>
      </div>
      <button class="btn-open" style="padding: 8px 16px; border-radius: 8px; border: none; background: #6366f1; color: white; cursor: pointer;">Открыть</button>
    </div>
  </div>

  <!-- 2. Ежедневные привычки -->
  <div class="habits-section">
    <h3 class="section-title" style="margin-bottom: 12px; font-size: 1.1rem;">Ежедневные привычки</h3>
    
    <div class="habits-list" style="display: flex; flex-direction: column; gap: 10px;">
      <div class="habit-card completed" onclick="toggleHabit(this)" style="display: flex; justify-content: space-between; align-items: center; padding: 14px; border-radius: 12px; cursor: pointer;">
        <div class="habit-info" style="display: flex; align-items: center; gap: 10px;">
          <span class="habit-icon">📚</span>
          <span class="habit-text">Чтение книги (15 мин)</span>
        </div>
        <div class="custom-checkbox" style="width: 24px; height: 24px; border: 2px solid #6366f1; border-radius: 6px; display: flex; align-items: center; justify-content: center;">
          <svg viewBox="0 0 24 24" class="checkmark" style="width: 16px; height: 16px; stroke: #fff;">
            <path d="M20 6L9 17l-5-5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <div class="habit-card completed" onclick="toggleHabit(this)" style="display: flex; justify-content: space-between; align-items: center; padding: 14px; border-radius: 12px; cursor: pointer;">
        <div class="habit-info" style="display: flex; align-items: center; gap: 10px;">
          <span class="habit-icon">💧</span>
          <span class="habit-text">Пить воду (1.5 л)</span>
        </div>
        <div class="custom-checkbox" style="width: 24px; height: 24px; border: 2px solid #6366f1; border-radius: 6px; display: flex; align-items: center; justify-content: center;">
          <svg viewBox="0 0 24 24" class="checkmark" style="width: 16px; height: 16px; stroke: #fff;">
            <path d="M20 6L9 17l-5-5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <div class="habit-card" onclick="toggleHabit(this)" style="display: flex; justify-content: space-between; align-items: center; padding: 14px; border-radius: 12px; cursor: pointer;">
        <div class="habit-info" style="display: flex; align-items: center; gap: 10px;">
          <span class="habit-icon">🇬🇧</span>
          <span class="habit-text">Учить английский</span>
        </div>
        <div class="custom-checkbox" style="width: 24px; height: 24px; border: 2px solid #6366f1; border-radius: 6px; display: flex; align-items: center; justify-content: center;">
          <svg viewBox="0 0 24 24" class="checkmark" style="width: 16px; height: 16px; stroke: #fff; display: none;">
            <path d="M20 6L9 17l-5-5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleHabit(card) {
      card.classList.toggle('completed');
      const checkmark = card.querySelector('.checkmark');
      if (card.classList.contains('completed')) {
        checkmark.style.display = 'block';
      } else {
        checkmark.style.display = 'none';
      }
    }
  </script>
</body>
</html>
